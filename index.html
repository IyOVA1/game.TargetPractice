<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Practice - 3D Knife Thrower</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="ui-container" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 z-10">
        <div class="flex justify-between items-center w-full">
            <div class="glass text-white px-6 py-3 rounded-2xl flex items-center gap-4 shadow-2xl">
                <span class="text-xs tracking-widest text-red-400 font-bold uppercase">Target Hits</span>
                <span id="score-val" class="text-3xl font-black text-red-500">0</span>
            </div>
            <div class="glass text-white px-6 py-3 rounded-2xl flex items-center gap-4 shadow-2xl">
                <span class="text-xs tracking-widest text-gray-400 font-bold uppercase">Knives Left</span>
                <span id="knives-val" class="text-3xl font-black text-amber-400">10</span>
            </div>
        </div>

        <div id="blood-flash" class="absolute inset-0 bg-red-600/40 opacity-0 pointer-events-none transition-opacity duration-100 rounded-none"></div>

        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
            <div class="w-8 h-8 border-2 border-red-500 rounded-full flex items-center justify-center animate-pulse">
                <div class="w-1.5 h-1.5 bg-red-500 rounded-full"></div>
            </div>
        </div>

        <div class="w-full flex justify-center items-center pb-8 pointer-events-auto">
            <div id="start-screen" class="glass p-8 rounded-3xl text-center max-w-md shadow-2xl flex flex-col items-center">
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-amber-500 mb-2 tracking-tight">TARGET: HUMAN</h1>
                <p class="text-gray-300 text-sm mb-6 leading-relaxed">The rules have changed. Forget safety markers. Pin down the spinning human target as many times as you can before running out of blades!</p>
                <button id="start-btn" class="bg-gradient-to-r from-red-600 to-amber-600 hover:from-red-500 hover:to-amber-500 text-white font-bold px-10 py-4 rounded-xl shadow-lg shadow-red-900/40 tracking-wider uppercase transform active:scale-95 transition cursor-pointer">Start Throwing</button>
            </div>

            <div id="gameover-screen" class="glass p-8 rounded-3xl text-center max-w-md shadow-2xl hidden flex flex-col items-center">
                <h2 class="text-3xl font-black text-red-500 mb-1 tracking-tight">OUT OF KNIVES!</h2>
                <p class="text-gray-400 text-xs tracking-wider uppercase mb-4">Performance Report</p>
                <div class="text-6xl font-black text-white mb-6" id="final-score">0</div>
                <button id="restart-btn" class="bg-white hover:bg-gray-200 text-black font-bold px-10 py-4 rounded-xl shadow-md tracking-wider uppercase transform active:scale-95 transition cursor-pointer">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        // Game Engine Variables
        let scene, camera, renderer, clock;
        let wheelGroup, humanMesh, wheelBackdrop;
        let knivesArray = [];
        let currentKnife = null;
        let isGameActive = false;
        
        // Gameplay Balancing Parameters
        let score = 0;
        let knivesLeft = 10;
        let currentWheelSpeed = 1.5;
        let targetSpeed = 1.5;
        let speedChangeTimer = 0;

        // Audio System Context Contexts
        let audioCtx, bgMusic, sfxThrow, sfxHit, sfxScream;

        // Document Object UI Links
        const scoreVal = document.getElementById('score-val');
        const knivesVal = document.getElementById('knives-val');
        const bloodFlash = document.getElementById('blood-flash');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScore = document.getElementById('final-score');

        // Setup Event Interfaces
        startBtn.addEventListener('click', initGameRuntime);
        restartBtn.addEventListener('click', restartGameSession);
        window.addEventListener('click', handleUserThrowAction);
        window.addEventListener('resize', onWindowResize, false);

        // Core Assembly Initializer
        function initEngineScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.fog = new THREE.FogExp2(0x0a0a0c, 0.03);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Set Up Lighting Space
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const spotlight = new THREE.SpotLight(0xfff5eb, 1.5);
            spotlight.position.set(5, 8, 10);
            spotlight.castShadow = true;
            spotlight.shadow.mapSize.width = 2048;
            spotlight.shadow.mapSize.height = 2048;
            scene.add(spotlight);

            const rimLight = new THREE.DirectionalLight(0x90b0ff, 0.6);
            rimLight.position.set(-5, -2, -5);
            scene.add(rimLight);

            // Wheel Group Compound Root Container
            wheelGroup = new THREE.Group();
            wheelGroup.position.set(0, 1, 0);
            scene.add(wheelGroup);

            // Build Asset Engine Fallbacks inside loaders asynchronously
            const loader = new THREE.GLTFLoader();

            // 1. Wheel backdrop asset connection
            loader.load('assets/models/target_wheel.glb', 
                (gltf) => {
                    wheelBackdrop = gltf.scene;
                    wheelGroup.add(wheelBackdrop);
                }, 
                undefined, 
                (err) => {
                    // Primitive fallback architecture if asset portfolio folder not present
                    const wheelGeo = new THREE.CylinderGeometry(3, 3, 0.4, 40);
                    wheelGeo.rotateX(Math.PI / 2);
                    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.8 });
                    wheelBackdrop = new THREE.Mesh(wheelGeo, wheelMat);
                    wheelGroup.add(wheelBackdrop);
                }
            );

            // 2. Human target assistant asset connection
            loader.load('assets/models/assistant.glb', 
                (gltf) => {
                    humanMesh = gltf.scene;
                    humanMesh.position.set(0, 0, 0.1);
                    wheelGroup.add(humanMesh);
                }, 
                undefined, 
                (err) => {
                    // Primitive fallback architecture for local server runs
                    humanMesh = new THREE.Group();
                    const bodyGeo = new THREE.CylinderGeometry(0.4, 0.3, 2, 16);
                    const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
                    const limbGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
                    const matchMat = new THREE.MeshStandardMaterial({ color: 0xdd9977 });
                    
                    const body = new THREE.Mesh(bodyGeo, matchMat);
                    const head = new THREE.Mesh(headGeo, matchMat);
                    head.position.y = 1.3;
                    
                    humanMesh.add(body, head);
                    humanMesh.position.set(0, 0, 0.2);
                    wheelGroup.add(humanMesh);
                }
            );

            clock = new THREE.Clock();
            prepareKnifeWeaponContainer();
            animateEngineLoop();
        }

        // Initialize Audio System context safely after interaction check
        function setupAudioSystem() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Allocate Asset buffers directly to clean standard naming handles
            bgMusic = new Audio('assets/audio/background_music.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.4;
            
            sfxThrow = new Audio('assets/audio/throw.mp3');
            sfxHit = new Audio('assets/audio/hit.mp3');
            sfxScream = new Audio('assets/audio/scream.mp3');
        }

        function initGameRuntime() {
            setupAudioSystem();
            if(bgMusic) bgMusic.play().catch(()=>{});
            
            score = 0;
            knivesLeft = 10;
            scoreVal.innerText = score;
            knivesVal.innerText = knivesLeft;
            
            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            isGameActive = true;
        }

        function prepareKnifeWeaponContainer() {
            if (currentKnife) scene.remove(currentKnife);

            currentKnife = new THREE.Group();
            const loader = new THREE.GLTFLoader();

            loader.load('assets/models/knife.glb', 
                (gltf) => {
                    currentKnife.add(gltf.scene);
                }, 
                undefined, 
                (err) => {
                    // Procedural blade architecture fallback
                    const bladeGeo = new THREE.BoxGeometry(0.05, 0.1, 0.6);
                    const handleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 8);
                    handleGeo.rotateX(Math.PI / 2);
                    
                    const bladeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });
                    const handleMat = new THREE.MeshStandardMaterial({ color: 0x663311 });
                    
                    const blade = new THREE.Mesh(bladeGeo, bladeMat);
                    const handle = new THREE.Mesh(handleGeo, handleMat);
                    handle.position.z = 0.45;
                    
                    currentKnife.add(blade, handle);
                }
            );

            // Initial stance matching center frame viewpoint trajectory
            currentKnife.position.set(0, -1, 4);
            scene.add(currentKnife);
        }

        function handleUserThrowAction(e) {
            if (!isGameActive || knivesLeft <= 0 || !currentKnife || e.target.tagName === 'BUTTON') return;

            knivesLeft--;
            knivesVal.innerText = knivesLeft;

            if (sfxThrow) { sfxThrow.currentTime = 0; sfxThrow.play().catch(()=>{}); }

            const activeKnifeInstance = currentKnife;
            currentKnife = null;

            // Simple vector animation handling linear physics
            const throwVelocity = -22; 
            const knifeRecord = {
                mesh: activeKnifeInstance,
                active: true,
                velocityZ: throwVelocity
            };
            knivesArray.push(knifeRecord);

            // Re-arm trigger timeline safely unless total clip empty
            setTimeout(() => {
                if (knivesLeft > 0 && isGameActive) {
                    prepareKnifeWeaponContainer();
                }
            }, 350);
        }

        // Processing custom intersection metrics targeting the core assistant object specifically
        function executeTargetCollisionEvaluation(knifeMesh) {
            // Compute coordinate layout vectors
            const knifeTipWorld = new THREE.Vector3();
            knifeMesh.getWorldPosition(knifeTipWorld);

            // Transfer structural position vector coordinates back to Local rotation spaces
            const localToWheel = wheelGroup.worldToLocal(knifeTipWorld.clone());

            // Structural distance processing check mapping human profile volume offsets
            const distanceToCenter = Math.sqrt(localToWheel.x * localToWheel.x + localToWheel.y * localToWheel.y);
            
            // True target condition check logic block
            if (distanceToCenter < 1.1) {
                // SUCCESS HIT: Human Target Struck
                score += 10;
                scoreVal.innerText = score;

                // Visual Juice Trigger
                bloodFlash.style.opacity = '1';
                setTimeout(() => bloodFlash.style.opacity = '0', 80);

                if (sfxHit) { sfxHit.currentTime = 0; sfxHit.play().catch(()=>{}); }
                if (sfxScream) { sfxScream.currentTime = 0; sfxScream.play().catch(()=>{}); }

                // Reparent structural matrix nodes directly onto target rotation compound tree structures
                scene.remove(knifeMesh);
                knifeMesh.position.copy(localToWheel);
                
                // Fast vector lock alignment matching insertion visual planes
                knifeMesh.rotation.set(0, 0, 0); 
                wheelGroup.add(knifeMesh);
            } else if (distanceToCenter <= 3.0) {
                // MISS: Struck outer empty frame backdrop context instead
                scene.remove(knifeMesh);
                knifeMesh.position.copy(localToWheel);
                wheelGroup.add(knifeMesh);
            } else {
                // Complete Whiff entirely out of bounds bounds structure
                scene.remove(knifeMesh);
            }

            // Check endgame framework sequences safely across frames
            if (knivesLeft === 0 && knivesArray.every(k => !k.active)) {
                endGameSessionSequence();
            }
        }

        function endGameSessionSequence() {
            isGameActive = false;
            finalScore.innerText = score;
            gameoverScreen.classList.remove('hidden');
        }

        function restartGameSession() {
            // Empty embedded projectile loops
            knivesArray.forEach(k => {
                if(k.mesh.parent) k.mesh.parent.remove(k.mesh);
            });
            knivesArray = [];
            
            initGameRuntime();
            prepareKnifeWeaponContainer();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animateEngineLoop() {
            requestAnimationFrame(animateEngineLoop);
            const delta = clock.getDelta();

            // Dynamic rotation sequence variation logic profiles
            speedChangeTimer += delta;
            if (speedChangeTimer > 2.5) {
                // Switch dynamic directional shifts instantly to trip up target prediction loops
                const directionToggle = Math.random() > 0.4 ? 1 : -1;
                targetSpeed = (0.8 + Math.random() * 2.2) * directionToggle;
                speedChangeTimer = 0;
            }
            
            // Linear engine easing transforms mapping rotation updates safely across cycles
            currentWheelSpeed = THREE.MathUtils.lerp(currentWheelSpeed, targetSpeed, delta * 2.0);
            wheelGroup.rotation.z += currentWheelSpeed * delta;

            // Runtime updating looping arrays rendering projectile physics trajectories
            for (let i = knivesArray.length - 1; i >= 0; i--) {
                const item = knivesArray[i];
                if (item.active) {
                    item.mesh.position.z += item.velocityZ * delta;
                    
                    // Direct target array collision horizon checkpoint interface
                    if (item.mesh.position.z <= 0.3) {
                        item.active = false;
                        executeTargetCollisionEvaluation(item.mesh);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // Boot system scripts on environment baseline window resolution ready
        window.onload = initEngineScene;
    </script>
</body>
</html>
